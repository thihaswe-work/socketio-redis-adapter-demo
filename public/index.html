<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Socket.IO + Redis Button Test</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 40px auto;
        text-align: center;
      }
      button {
        padding: 12px 20px;
        font-size: 16px;
        margin-bottom: 20px;
      }
      #log {
        border: 1px solid #ccc;
        padding: 10px;
        height: 300px;
        overflow-y: auto;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <h2>Socket.IO + Redis Button Test</h2>
    <button id="btn">Click Me</button>
    <div id="log"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const log = document.getElementById("log");
      const btn = document.getElementById("btn");

      btn.onclick = () => {
        socket.emit("button-click");
      };

      socket.on("button-event", (data) => {
        const div = document.createElement("div");
        div.textContent =
          `[${new Date(data.time).toLocaleTimeString()}] ` +
          `Server ${data.port || "local"} | From ${data.from}`;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
      });
    </script>
  </body>
</html>
